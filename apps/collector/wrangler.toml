name = "celine-collector"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 매일 03:00 UTC 수집 트리거
[triggers]
crons = ["0 3 * * *"]

# Supabase Postgres 연결 (Hyperdrive) — web 워커와 동일한 Hyperdrive 설정 재사용.
#   npx wrangler hyperdrive create celine-db --connection-string="postgres://..."
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "07f80eaefaa6470d9cf0fa956626d603"

# Cloudflare Queues 미사용(무료 플랜): 수집은 scheduled()/manual-collect 에서
# ctx.waitUntil 로 직접 순차 실행한다.

# 비밀값은 `wrangler secret put` 으로 주입:
#   npx wrangler secret put APIFY_TOKEN
[vars]
MAX_ITEMS = "50"
# Apify 완료 webhook 수신 주소의 베이스 (이 워커의 공개 URL).
PUBLIC_URL = "https://celine-collector.vousmemanquez.workers.dev"
# APIFY_ACTOR_META_ADS = "curious_coder~facebook-ads-library-scraper"
# APIFY_ACTOR_INSTAGRAM = "apify~instagram-scraper"
# APIFY_ACTOR_TWITTER = "apidojo~tweet-scraper"
# APIFY_ACTOR_TIKTOK = "clockworks~tiktok-scraper"
